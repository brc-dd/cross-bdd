name: Test

on:
  workflow_call:
    inputs:
      deno_versions:
        type: string
      node_versions:
        type: string
      bun_versions:
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - run: |
          set -euo pipefail
          shopt -s globstar nullglob extglob

          DENO_VERSIONS="${{ inputs.deno_versions }}"
          NODE_VERSIONS="${{ inputs.node_versions }}"
          BUN_VERSIONS="${{ inputs.bun_versions }}"

          detect_pm() {
            if [[ -f deno.lock ]]; then echo deno; return; fi
            if [[ -f pnpm-lock.yaml ]]; then echo pnpm; return; fi
            if [[ -f bun.lock ]]; then echo bun; return; fi
            echo "No supported lockfile found (deno.lock, pnpm-lock.yaml, bun.lock)." >&2
            exit 1
          }
          PM=$(detect_pm)

          pm_runtime() {
            case "$1" in
              deno) echo deno ;;
              pnpm) echo node ;;
              bun)  echo bun ;;
            esac
          }

          declare -a NPM_DEPS=()
          declare -a JSR_DEPS=()

          if [[ -f deno.json ]]; then
            while IFS= read -r dep; do
              [[ -n "$dep" ]] && NPM_DEPS+=("$dep")
            done < <(jq -r '.imports // {} | to_entries[]? | select(.value|startswith("npm:")) | .value[4:]' deno.json 2>/dev/null || true)
            while IFS= read -r dep; do
              [[ -n "$dep" ]] && JSR_DEPS+=("$dep")
            done < <(jq -r '.imports // {} | to_entries[]? | select(.value|startswith("jsr:")) | .value' deno.json 2>/dev/null || true)
          fi

          current_rt=""

          setup_runtime() {
            local rt=$1 ver=$2
            local key="$rt:$ver"
            [[ "$current_rt" == "$key" ]] && return 0

            if [[ -n "$current_rt" ]]; then
              git reset --hard HEAD
              git clean -fdx -e dist
            fi

            pnpm runtime set "$rt" "$ver" -g
            current_rt="$key"
          }

          install_deps() {
            local rt=$1
            [[ -d node_modules ]] && return 0

            case "${PM}:${rt}" in
            deno:deno)
              return 0
              ;;
            deno:*)
              [[ -f package.json ]] || echo '{ "type": "module" }' >package.json
              if ((${#NPM_DEPS[@]})); then
                "$rt" add "${NPM_DEPS[@]}"
              fi
              if ((${#JSR_DEPS[@]})); then
                if [[ "$rt" == "bun" ]]; then
                  bun x jsr add "${JSR_DEPS[@]#jsr:}"
                else
                  pnpm add "${JSR_DEPS[@]}"
                fi
              fi
              ;;
            *:*)
              "$rt" install
              ;;
            esac
          }

          has_task() {
            local task=$1
            ([[ -f deno.json ]] && jq -e --arg t "$task" '.tasks[$t]' deno.json >/dev/null 2>&1) ||
              ([[ -f package.json ]] && jq -e --arg t "$task" '.scripts[$t]' package.json >/dev/null 2>&1)
          }

          run_task() {
            local rt=$1 task=$2 fallback="${3:-}"

            install_deps "$rt"

            if has_task "$task"; then
              case "$rt" in
              deno) deno task "$task" ;;
              pnpm) pnpm run "$task" ;;
              bun)  bun run "$task" ;;
              esac
            elif [[ -n "$fallback" ]]; then
              eval "$fallback"
            fi
          }

          pick_build_version() {
            local versions=""
            case "$PM" in
              deno) versions="$DENO_VERSIONS" ;;
              pnpm) versions="$NODE_VERSIONS" ;;
              bun)  versions="$BUN_VERSIONS" ;;
            esac
            if [[ -z "$versions" ]]; then
              echo "Detected package manager '$PM' but its version list input is empty. Set the corresponding *_versions input." >&2
              exit 1
            fi
            echo "${versions##* }"
          }

          setup_runtime "$(pm_runtime "$PM")" "$(pick_build_version)"

          run_task "$PM" build
          run_task "$PM" check:only

          if [[ -d ./dist && -f ./dist/package.json ]]; then
            (cd dist && pnpm pack --out=pkg.tgz >/dev/null)
            NPM_DEPS=("./dist/pkg.tgz" "${NPM_DEPS[@]}")
          fi

          declare -a TEST_FILES=()
          mapfile -d '' -t TEST_FILES < <(git ls-files -z '*.test.ts')

          run_tests() {
            local rt=$1 ver=$2

            setup_runtime "$rt" "$ver"

            case "$rt" in
            deno)
              run_task deno test:deno "deno test -A ${TEST_FILES[*]}"
              ;;
            node)
              run_task pnpm test:node "pnpx tsx --test ${TEST_FILES[*]}"
              ;;
            bun)
              run_task bun test:bun "bun test ${TEST_FILES[*]}"
              ;;
            esac
          }

          run_versions() {
            local rt=$1 versions=$2
            [[ -z "$versions" ]] && return 0
            for v in $versions; do
              run_tests "$rt" "$v"
            done
          }

          run_versions deno "$DENO_VERSIONS"
          run_versions node "$NODE_VERSIONS"
          run_versions bun  "$BUN_VERSIONS"
